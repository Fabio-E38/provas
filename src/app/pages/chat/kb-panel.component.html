<div class="kb-shell">

  <!-- Header -->
  <div class="kb-header">
    <div class="kb-header-ico">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    </div>
    <span class="kb-header-title">Knowledge Base</span>
  </div>

  <!-- Empty state -->
  @if (documents.length === 0) {
    <div class="kb-empty">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p class="kb-empty-text">Scrivi un messaggio per vedere i documenti consigliati.</p>
    </div>
  }

  <!-- Documents -->
  <div class="kb-list">
    @for (doc of documents; track doc.id) {
      <div class="kb-doc-item">
        <div class="kb-doc-head">
          <span class="kb-doc-tag">{{ doc.fileType }}</span>
        </div>
        <p class="kb-doc-title">{{ doc.title }}</p>
        <p class="kb-doc-summary">{{ doc.summary }}</p>
      </div>
    }
  </div>

</div>
